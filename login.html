<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Inicia sesión en Puente y continúa aprendiendo inglés.">
  <title>Iniciar sesión — Puente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>

<body class="auth-page">

  <div class="auth-card">
    <a href="index.html" class="auth-logo">Puente</a>

    <h1>Bienvenido de vuelta</h1>
    <p class="auth-subtitle">Continúa donde lo dejaste.</p>

    <!-- Error message -->
    <div class="auth-error" id="login-error" role="alert"></div>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label for="login-email">Correo electrónico</label>
        <input type="email" id="login-email" name="email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" name="password" placeholder="Tu contraseña" autocomplete="current-password" required>
      </div>

      <div style="text-align: right; margin-top: -10px; margin-bottom: 18px;">
        <a href="reset-password.html" style="font-size: 0.85rem; color: var(--text-muted);">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar sesión</button>
    </form>

    <p class="auth-switch">
      ¿No tienes cuenta? <a href="signup.html">Crear cuenta gratis</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
