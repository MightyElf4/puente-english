<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Crea tu cuenta en Puente y empieza a aprender inglés gratis.">
  <title>Crear cuenta — Puente</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  </script>
</head>

<body class="auth-page">

  <div class="auth-card">
    <a href="index.html" class="auth-logo">Puente</a>

    <h1>Crear cuenta</h1>
    <p class="auth-subtitle">Es gratis, siempre.</p>

    <form id="signup-form" novalidate>

      <!-- Role picker -->
      <div class="role-picker">
        <label class="role-option selected">
          <input type="radio" name="role" value="student" checked>
          <span class="role-icon">🎓</span>
          <span class="role-label">Estudiante</span>
          <span class="role-desc">Quiero aprender inglés</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="teacher">
          <span class="role-icon">👩‍🏫</span>
          <span class="role-label">Docente</span>
          <span class="role-desc">Quiero crear clases</span>
        </label>
      </div>

      <!-- Error message -->
      <div class="auth-error" id="signup-error" role="alert"></div>

      <!-- Fields -->
      <div class="form-group">
        <label for="signup-name">Nombre completo</label>
        <input type="text" id="signup-name" name="name" placeholder="Tu nombre" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="signup-email">Correo electrónico</label>
        <input type="email" id="signup-email" name="email" placeholder="tucorreo@ejemplo.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="signup-password">Contraseña</label>
        <input type="password" id="signup-password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
      </div>

      <div class="form-group">
        <label for="signup-confirm">Confirmar contraseña</label>
        <input type="password" id="signup-confirm" name="confirm" placeholder="Repite tu contraseña" autocomplete="new-password" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">Crear cuenta</button>
    </form>

    <p class="auth-switch">
      ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
    </p>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
